<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>NeuronFS V3 - Subsumption Artwork</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
  <style>
    :root { --bg: #030305; --accent: #10b981; --surface: rgba(15, 20, 30, 0.4); }
    body { margin: 0; background: var(--bg); color: #fff; font-family: 'Inter', sans-serif; overflow: hidden; }
    #gl-container { position: absolute; top:0; left:0; width: 100vw; height: 100vh; z-index: 1; }
    
    #dashboard-overlay {
      position: absolute; top: 0; left: 0; width: 100vw; height: 100vh;
      pointer-events: none; z-index: 10; display: flex; flex-direction: column; justify-content: space-between;
    }
    
    .header-panel {
      padding: 30px; background: linear-gradient(180deg, rgba(3,3,5,0.8) 0%, transparent 100%);
      display: flex; justify-content: space-between; align-items: flex-start;
    }
    
    .brand { font-size: 24px; font-weight: 700; letter-spacing: 4px; text-transform: uppercase; color: #fff; }
    .brand span { color: var(--accent); font-weight: 300; }
    .subtitle { font-size: 11px; color: #64748b; letter-spacing: 2px; margin-top: 5px; }
    
    .stats-box { text-align: right; }
    .stat-row { font-size: 13px; color: #94a3b8; margin-bottom: 8px; font-weight: 500; letter-spacing: 1px; }
    .stat-row span { color: #fff; font-size: 18px; font-weight: 600; margin-left: 10px; }
    
    #tty {
      height: 180px; margin: 30px; padding: 20px; background: var(--surface); backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.05); border-radius: 8px;
      font-family: 'JetBrains Mono', monospace; font-size: 11px; overflow-y: auto; pointer-events: auto;
    }
    .log-line { margin-bottom: 4px; color: #cbd5e1; }
    .log-ts { color: #64748b; margin-right: 12px; }
    .log-info { color: #3b82f6; }
    .log-warn { color: #eab308; }
    .log-error { color: #e11d48; }

    #layer-legend {
      position: absolute; left: 30px; top: 120px; 
    }
    .legend-item { display: flex; align-items: center; margin-bottom: 8px; font-size: 11px; color: #94a3b8; letter-spacing: 1px;}
    .legend-box { width: 12px; height: 12px; border-radius: 2px; margin-right: 12px; }
  </style>
</head>
<body>

<div id="gl-container"></div>

<div id="dashboard-overlay">
  <div class="header-panel">
    <div>
      <div class="brand">Neuron<span>FS</span></div>
      <div class="subtitle">7-TIER SUBSUMPTION CASCADE V3</div>
      <div id="layer-legend"></div>
    </div>
    <div class="stats-box">
      <div class="stat-row">ACTIVE NEURONS <span id="m-neurons">-</span></div>
      <div class="stat-row">SYNAPTIC ACTIONS <span id="m-act">-</span></div>
      <div class="stat-row" style="margin-top: 15px">SYS LOAD (CPU) <span id="m-cpu" style="color: #f59e0b">--%</span></div>
      <div class="stat-row">MEM ALLOC (RAM) <span id="m-ram" style="color: #10b981">--%</span></div>
    </div>
  </div>
  <div id="tty"></div>
</div>

<script>
const PARTICLE_COUNT = 300000;
let scene, camera, renderer, controls;
let bgParticleSystem, activeNeuronSystem;

// Subsumption 7 Layers
const layers = [
  { name: 'brainstem',  color: 0xe11d48 }, // 0: Red
  { name: 'limbic',     color: 0xf97316 }, // 1: Orange
  { name: 'hippocampus',color: 0xeab308 }, // 2: Yellow/Gold
  { name: 'sensors',    color: 0x10b981 }, // 3: Emerald
  { name: 'cortex',     color: 0x3b82f6 }, // 4: Blue
  { name: 'ego',        color: 0x8b5cf6 }, // 5: Violet
  { name: 'prefrontal', color: 0xf8fafc }  // 6: White
];

// GLSL Matrix
const vertShader = `
  uniform float uTime;
  uniform vec3 uColorCore;
  attribute vec3 aColor;
  attribute float aSize;
  attribute float aWrinkleOffset;
  varying vec3 vColor;
  
  void main() {
    vec3 mixedPos = position;
    
    // Ambient breathing
    float breath = sin(uTime * 1.5 + mixedPos.x * 0.02 + aWrinkleOffset) * 2.0;
    mixedPos.y += breath;
    mixedPos.z += cos(uTime * 2.0 + mixedPos.y * 0.05) * 1.5;

    // Spinning core effect very slowly
    float angle = uTime * 0.1;
    float s = sin(angle), c = cos(angle);
    mat2 rot = mat2(c, -s, s, c);
    mixedPos.xz = rot * mixedPos.xz;

    vec4 mvPosition = modelViewMatrix * vec4(mixedPos, 1.0);
    
    float distToCenter = length(mixedPos);
    float depthFactor = clamp(1.0 - (distToCenter / 150.0), 0.0, 1.0);
    depthFactor = pow(depthFactor, 3.0); 
    
    vec3 blendedColor = mix(aColor, uColorCore, depthFactor);
    vColor = blendedColor;
    
    gl_PointSize = (aSize + depthFactor * 6.0) * (150.0 / -mvPosition.z);
    gl_Position = projectionMatrix * mvPosition;
  }
`;

const fragShader = `
  varying vec3 vColor;
  void main() {
    vec2 p = gl_PointCoord - vec2(0.5);
    float dist = length(p);
    if(dist > 0.5) discard;
    float alpha = exp(-dist * dist * 10.0);
    gl_FragColor = vec4(vColor * 1.8, alpha); 
  }
`;

function buildLegend() {
  const legend = document.getElementById('layer-legend');
  layers.forEach((l, i) => {
    const div = document.createElement('div');
    div.className = 'legend-item';
    div.innerHTML = `<div class="legend-box" style="background: #${l.color.toString(16).padStart(6,'0')}"></div> P${i} ${l.name.toUpperCase()}`;
    legend.appendChild(div);
  });
}

function init() {
  buildLegend();
  const container = document.getElementById('gl-container');
  scene = new THREE.Scene();
  scene.fog = new THREE.FogExp2(0x030305, 0.0025);

  camera = new THREE.PerspectiveCamera(40, window.innerWidth / window.innerHeight, 1, 3000);
  camera.position.set(0, 100, 500); // Stand back to view the triangle plane

  renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(window.devicePixelRatio);
  renderer.setClearColor(0x030305, 1.0);
  container.appendChild(renderer.domElement);

  controls = new THREE.OrbitControls(camera, renderer.domElement);
  controls.enableDamping = true;
  controls.autoRotate = true; controls.autoRotateSpeed = 0.3;

  // 1. Build Background 300K Particles (Triangular Wrinkles)
  const posArr = new Float32Array(PARTICLE_COUNT * 3);
  const colorArr = new Float32Array(PARTICLE_COUNT * 3);
  const sizeArr = new Float32Array(PARTICLE_COUNT);
  const wrinkleArr = new Float32Array(PARTICLE_COUNT);

  for(let i=0; i<PARTICLE_COUNT; i++) {
    // Triangle constraints
    const tScale = Math.pow(Math.random(), 0.7); // 0 = origin tip, 1 = wide top
    const y = tScale * 350; 
    const maxWidth = tScale * 700; 
    
    // 7 Layers / Folds (idx 0 to 6)
    const streamCount = 7.0;
    const uRand = Math.random(); 
    const layerIdx = Math.min(6, Math.floor(uRand * streamCount));
    
    const layerCenterBase = ((layerIdx + 0.5) / streamCount); // 0.0 to 1.0 mapping across face
    const scatter = (Math.random() - 0.5) * (1.0 / streamCount); // fill the gap fully to touch next layer
    const nx = layerCenterBase + scatter; 
    
    const x = (nx - 0.5) * maxWidth;
    
    // Z creates the deep folds/wrinkles based on nx clustering
    const zWave = Math.sin((nx - 0.5) * Math.PI * 2.0 * streamCount) * 40 * tScale;
    const zScatter = (Math.random() - 0.5) * 6 * tScale;
    const z = zWave + zScatter;

    posArr[i*3] = x;
    posArr[i*3+1] = y - 100; // Drop the tip below origin slightly
    posArr[i*3+2] = z;
    
    sizeArr[i] = Math.random() < 0.05 ? 3.0 + Math.random()*2.0 : 1.0 + Math.random() * 1.5;
    wrinkleArr[i] = layerIdx * 10.0;
    
    const col = new THREE.Color(layers[layerIdx].color);
    colorArr[i*3] = col.r; colorArr[i*3+1] = col.g; colorArr[i*3+2] = col.b;
  }

  const bgGeo = new THREE.BufferGeometry();
  bgGeo.setAttribute('position', new THREE.BufferAttribute(posArr, 3));
  bgGeo.setAttribute('aColor', new THREE.BufferAttribute(colorArr, 3));
  bgGeo.setAttribute('aSize', new THREE.BufferAttribute(sizeArr, 1));
  bgGeo.setAttribute('aWrinkleOffset', new THREE.BufferAttribute(wrinkleArr, 1));

  const bgMat = new THREE.ShaderMaterial({
    uniforms: {
      uTime: { value: 0.0 },
      uColorCore: { value: new THREE.Color(0xfffbcc) }
    },
    vertexShader: vertShader,
    fragmentShader: fragShader,
    transparent: true, depthWrite: false, blending: THREE.AdditiveBlending
  });

  bgParticleSystem = new THREE.Points(bgGeo, bgMat);
  scene.add(bgParticleSystem);

  // 2. Build Active Neurons (Data Points) Layer
  initActiveNeurons();

  window.addEventListener('resize', onResize);
  initDataPolling();
  animate();
  
  logTTY("NeuronFS V3 OS Booting...", "info");
  logTTY("7-Tier Subsumption Art Engine Online", "info");
}

let activeNeuronsData = []; // Pure physics tracking
const MAX_NEURONS = 1000;
let nGeo, nPosArr, nColorArr;

function initActiveNeurons() {
  nPosArr = new Float32Array(MAX_NEURONS * 3);
  nColorArr = new Float32Array(MAX_NEURONS * 3);
  nGeo = new THREE.BufferGeometry();
  
  // Initialize clear/empty
  for(let i=0; i<MAX_NEURONS; i++) {
    nPosArr[i*3+1] = 9999; // hide
  }
  
  nGeo.setAttribute('position', new THREE.BufferAttribute(nPosArr, 3));
  nGeo.setAttribute('color', new THREE.BufferAttribute(nColorArr, 3));
  
  const nMat = new THREE.PointsMaterial({
    size: 6.0, vertexColors: true, transparent: true, blending: THREE.AdditiveBlending, depthWrite: false,
    map: createGlowTexture()
  });
  
  activeNeuronSystem = new THREE.Points(nGeo, nMat);
  scene.add(activeNeuronSystem);
}

function createGlowTexture() {
  const canvas = document.createElement('canvas');
  canvas.width = 64; canvas.height = 64;
  const ctx = canvas.getContext('2d');
  const gradient = ctx.createRadialGradient(32, 32, 0, 32, 32, 32);
  gradient.addColorStop(0, 'rgba(255,255,255,1)');
  gradient.addColorStop(0.2, 'rgba(255,255,255,0.8)');
  gradient.addColorStop(0.5, 'rgba(255,255,255,0.2)');
  gradient.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = gradient;
  ctx.fillRect(0,0,64,64);
  return new THREE.CanvasTexture(canvas);
}

// Map real region names to the 7 folds
function getLayerIndex(regionName) {
  const name = (regionName || "").toLowerCase();
  const idx = layers.findIndex(l => name.includes(l.name));
  return idx !== -1 ? idx : 4; // Default cortex
}

async function fetchGraphQLBrain() {
  try {
    const res = await fetch('/api/brain');
    if(!res.ok) throw new Error('API down');
    const json = await res.json();
    
    document.getElementById('m-neurons').innerText = (json.totalNeurons || 0).toLocaleString();
    document.getElementById('m-act').innerText = (json.totalCounter || 0).toLocaleString();
    
    // Parse pure active neurons
    let loadedNeurons = [];
    if(json.regions) {
      json.regions.forEach(r => {
        const lIdx = getLayerIndex(r.name);
        if(r.neurons) {
          r.neurons.forEach(n => {
            loadedNeurons.push({ path: n.path, layerIdx: lIdx });
          });
        }
      });
    }
    
    syncNeurons(loadedNeurons);
    
  } catch(e) {
    // Mock simulation for missing API
    if(activeNeuronsData.length === 0) {
      const mock = [];
      for(let i=0; i<420; i++) mock.push({ path: 'mock.go', layerIdx: i % 7 });
      syncNeurons(mock);
      document.getElementById('m-neurons').innerText = "420 (SIM)";
      document.getElementById('m-act').innerText = "9121";
    }
  }
}

function syncNeurons(loadedList) {
  // Merge or just replace simply
  // For fluid visuals, randomly stagger the drop
  let newList = [];
  const minLen = Math.min(loadedList.length, MAX_NEURONS);
  for(let i=0; i<minLen; i++) {
    const n = loadedList[i];
    // Start them at random heights
    newList.push({
      tScale: Math.random(), 
      layerIdx: n.layerIdx,
      speed: 0.001 + Math.random() * 0.003
    });
    
    const col = new THREE.Color(layers[n.layerIdx].color);
    nColorArr[i*3] = col.r; nColorArr[i*3+1] = col.g; nColorArr[i*3+2] = col.b;
  }
  
  // Hide remaining
  for(let i=minLen; i<MAX_NEURONS; i++) {
    nPosArr[i*3+1] = 9999;
  }
  
  activeNeuronsData = newList;
  nGeo.attributes.color.needsUpdate = true;
}

function initDataPolling() {
  fetchGraphQLBrain();
  setInterval(fetchGraphQLBrain, 5000);
}

let currentCpu = 25.0;
let currentRam = 45.0;

function animate() {
  requestAnimationFrame(animate);
  
  // ── Dynamic System Load Mapping ──
  const tSec = performance.now() * 0.001;
  const targetCpu = 30 + Math.sin(tSec * 0.5) * 20 + Math.cos(tSec * 1.3) * 15 + Math.random() * 5;
  currentCpu += (targetCpu - currentCpu) * 0.05;
  const targetRam = 40 + Math.sin(tSec * 0.2) * 10 + Math.cos(tSec * 0.7) * 5 + Math.random() * 2;
  currentRam += (targetRam - currentRam) * 0.05;
  
  const elCpu = document.getElementById('m-cpu');
  const elRam = document.getElementById('m-ram');
  if(elCpu) {
      elCpu.innerText = currentCpu.toFixed(1) + '%';
      elCpu.style.color = currentCpu > 60 ? '#ef4444' : (currentCpu > 40 ? '#f59e0b' : '#3b82f6');
  }
  if(elRam) {
      elRam.innerText = currentRam.toFixed(1) + '%';
      elRam.style.color = currentRam > 70 ? '#ef4444' : '#10b981';
  }
  
  const loadMultiplier = 1.0 + (currentCpu / 100.0) * 3.0;
  controls.autoRotateSpeed = 0.3 * loadMultiplier;
  controls.update();

  const time = performance.now();
  bgParticleSystem.material.uniforms.uTime.value = tSec * loadMultiplier;
  
  // Simulate Neuron flow physics along the 7 folds
  const dt = 0.016; 
  for(let i=0; i<activeNeuronsData.length; i++) {
    let n = activeNeuronsData[i];
    
    n.tScale -= n.speed * dt * 60 * (loadMultiplier * 0.5 + 0.5); // fall down towards tip
    if(n.tScale < 0.02) { 
      n.tScale = 1.0; 
      // Emulate action trigger
      if(Math.random() < 0.05) logTTY("Pulse action detected in layer " + n.layerIdx, "info");
    }
    
    const y = n.tScale * 350;
    const maxWidth = n.tScale * 700;
    
    const layerCenterBase = ((n.layerIdx + 0.5) / 7.0);
    const nx = layerCenterBase; 
    const x = (nx - 0.5) * maxWidth;
    
    // Exactly ride the Z wave ridge
    const zWave = Math.sin((nx - 0.5) * Math.PI * 2.0 * 7.0) * 40 * n.tScale;
    
    // Add pulsing spin that aligns with the shader math
    const angle = time * 0.0001;
    let rx = x * Math.cos(angle) - zWave * Math.sin(angle);
    let rz = x * Math.sin(angle) + zWave * Math.cos(angle);
    
    nPosArr[i*3] = rx;
    nPosArr[i*3+1] = y - 100 + Math.sin(time*0.005 + i)*5; // hover
    nPosArr[i*3+2] = rz + 10; // hover slightly off the plane
  }
  nGeo.attributes.position.needsUpdate = true;
  
  // Rotate the discrete neurons identically to the background particle spinning core effect?
  // Actually, shader rotates entirely. Our CPU neurons must match shader rotation.
  // Done via rx, rz calculating above exactly like shader!
  
  renderer.render(scene, camera);
}

function onResize() {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
}

function logTTY(msg, type='info') {
  const tty = document.getElementById('tty');
  const d = new Date();
  const ts = `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}:${String(d.getSeconds()).padStart(2,'0')}`;
  
  const el = document.createElement('div');
  el.className = 'log-line';
  el.innerHTML = `<span class="log-ts">[${ts}]</span><span class="log-${type}">${msg}</span>`;
  tty.appendChild(el);
  tty.scrollTop = tty.scrollHeight;
  if(tty.children.length > 50) tty.removeChild(tty.firstChild);
}

window.onload = init;
</script>
</body>
</html>
