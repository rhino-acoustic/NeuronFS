<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>NeuronFS V3 - Generative Artwork</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
  <style>
    :root { --bg: #030305; --accent: #10b981; --surface: rgba(15, 20, 30, 0.5); }
    body { margin: 0; background: var(--bg); color: #fff; font-family: 'Inter', sans-serif; overflow: hidden; }
    #gl-container { position: absolute; top:0; left:0; width: 100vw; height: 100vh; z-index: 1; }
    #ui-panel {
      position: absolute; top: 30px; left: 30px; z-index: 10; width: 340px;
      background: var(--surface); backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.08); border-radius: 12px; padding: 25px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.5);
    }
    h1 { font-size: 18px; margin: 0 0 20px 0; font-weight: 600; text-transform: uppercase; letter-spacing: 2px; }
    p { font-size: 12px; color: #94a3b8; line-height: 1.6; margin-bottom: 20px; }
    .layout-btn {
      display: block; width: 100%; text-align: left; background: rgba(0,0,0,0.3); 
      border: 1px solid rgba(255,255,255,0.05); color: #94a3b8; padding: 12px 20px; 
      margin-bottom: 10px; border-radius: 6px; cursor: pointer; transition: all 0.3s;
      font-size: 13px; font-weight: 500;
    }
    .layout-btn:hover { background: rgba(16, 185, 129, 0.1); color: #fff; }
    .layout-btn.active {
      background: rgba(16, 185, 129, 0.15); border-color: var(--accent); color: var(--accent);
      box-shadow: 0 0 20px rgba(16, 185, 129, 0.3);
    }
  </style>
</head>
<body>

<div id="gl-container"></div>
<div id="ui-panel">
  <h1>V3 Generative Art</h1>
  <p>압도적인 성능의 Vertex Shader 기반 커스텀 입자(Particles) 맵.<br><b>300,000</b>개의 빛 점들을 사용한 아트워크 레이아웃.</p>
  <button class="layout-btn active" onclick="switchLayout(0, this)">1. Neural Galaxy (나선 은하)</button>
  <button class="layout-btn" onclick="switchLayout(1, this)">2. Lorenz Attractor (카오스 에너지)</button>
  <button class="layout-btn" onclick="switchLayout(2, this)">3. Synaptic Core (초정밀 군집)</button>
</div>

<script>
const PARTICLE_COUNT = 300000;
let scene, camera, renderer, controls, particleSystem;

// GLSL Shaders for 300K smooth transition points
const vertShader = `
  uniform float uTime;
  uniform float uTransition;
  attribute vec3 targetPos;
  attribute vec3 aColor;
  attribute float aSize;
  varying vec3 vColor;
  
  void main() {
    vColor = aColor;
    
    // Smooth Lerp between current (position) and target (targetPos)
    vec3 mixedPos = mix(position, targetPos, uTransition);
    
    // Ambient breathing/floating noise
    float breath = sin(uTime * 2.0 + mixedPos.x * 0.05) * 2.0;
    mixedPos.y += breath * uTransition; 
    
    // Spinning core effect
    float angle = uTime * 0.2;
    float s = sin(angle), c = cos(angle);
    mat2 rot = mat2(c, -s, s, c);
    mixedPos.xz = rot * mixedPos.xz;

    vec4 mvPosition = modelViewMatrix * vec4(mixedPos, 1.0);
    
    // Size attenuation (closer = bigger)
    gl_PointSize = aSize * (150.0 / -mvPosition.z);
    gl_Position = projectionMatrix * mvPosition;
  }
`;

const fragShader = `
  varying vec3 vColor;
  void main() {
    // Create soft glowing circle texture mathematically
    vec2 p = gl_PointCoord - vec2(0.5);
    float dist = length(p);
    if(dist > 0.5) discard;
    
    // Soft gaussian-like falloff
    float alpha = exp(-dist * dist * 10.0);
    gl_FragColor = vec4(vColor * 1.5, alpha); // x1.5 for extra bloom brightness
  }
`;

let targetPositions = [];
let currentPositions = [];
let geometry;
let transStart = 0;
let isTransitioning = false;

function init() {
  const container = document.getElementById('gl-container');
  scene = new THREE.Scene();
  scene.fog = new THREE.FogExp2(0x030305, 0.003);

  camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 1, 1500);
  camera.position.set(200, 150, 300);

  renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(window.devicePixelRatio);
  renderer.setClearColor(0x030305, 1.0);
  container.appendChild(renderer.domElement);

  controls = new THREE.OrbitControls(camera, renderer.domElement);
  controls.enableDamping = true;
  controls.autoRotate = true; controls.autoRotateSpeed = 0.5;

  // Initialize buffers
  const posArr = new Float32Array(PARTICLE_COUNT * 3);
  const targetArr = new Float32Array(PARTICLE_COUNT * 3);
  const colorArr = new Float32Array(PARTICLE_COUNT * 3);
  const sizeArr = new Float32Array(PARTICLE_COUNT);

  const colors = [
    new THREE.Color(0x10b981), // Emerald
    new THREE.Color(0x3b82f6), // Blue
    new THREE.Color(0x06b6d4), // Cyan
    new THREE.Color(0x8b5cf6), // Violet
    new THREE.Color(0xa78bfa)  // Purple
  ];

  // Starting Initial Random Positions
  for(let i=0; i<PARTICLE_COUNT; i++) {
    const x = (Math.random()-0.5) * 500;
    const y = (Math.random()-0.5) * 500;
    const z = (Math.random()-0.5) * 500;
    
    posArr[i*3] = x; posArr[i*3+1] = y; posArr[i*3+2] = z;
    targetArr[i*3] = x; targetArr[i*3+1] = y; targetArr[i*3+2] = z;
    
    // Assign varying sizes to simulate stars
    sizeArr[i] = Math.random() < 0.05 ? 4.0 + Math.random()*2.0 : Math.random() * 2.0;
    
    const col = colors[Math.floor(Math.random()*colors.length)];
    colorArr[i*3] = col.r; colorArr[i*3+1] = col.g; colorArr[i*3+2] = col.b;
  }

  geometry = new THREE.BufferGeometry();
  geometry.setAttribute('position', new THREE.BufferAttribute(posArr, 3));
  geometry.setAttribute('targetPos', new THREE.BufferAttribute(targetArr, 3));
  geometry.setAttribute('aColor', new THREE.BufferAttribute(colorArr, 3));
  geometry.setAttribute('aSize', new THREE.BufferAttribute(sizeArr, 1));

  const material = new THREE.ShaderMaterial({
    uniforms: {
      uTime: { value: 0.0 },
      uTransition: { value: 1.0 } // Initially 1 so it stays at target
    },
    vertexShader: vertShader,
    fragmentShader: fragShader,
    transparent: true, depthWrite: false, blending: THREE.AdditiveBlending
  });

  particleSystem = new THREE.Points(geometry, material);
  scene.add(particleSystem);

  window.addEventListener('resize', onResize);
  
  // Create generating target sets
  setTimeout(() => loadLayout(0), 100);
  animate();
}

function loadLayout(idx) {
  const tArr = geometry.attributes.targetPos.array;
  
  if(idx === 0) {
    // Neural Galaxy
    for(let i=0; i<PARTICLE_COUNT; i++) {
      const radius = Math.pow(Math.random(), 3) * 200; // dense core
      const angle = radius * 0.1 + Math.random() * Math.PI * 2;
      const spread = Math.max(0, 40 - radius*0.2); // thick core, thin edge
      tArr[i*3] = Math.cos(angle) * (radius + Math.random()*spread);
      tArr[i*3+1] = (Math.random()-0.5) * spread * 2.0;
      tArr[i*3+2] = Math.sin(angle) * (radius + Math.random()*spread);
    }
  } else if(idx === 1) {
    // Lorenz Attractor 3D map
    // Extremely cool chaotic physics mapping
    let x = 0.1, y = 0, z = 0;
    const dt = 0.005;
    for(let i=0; i<PARTICLE_COUNT; i++) {
      // integrate Lorenz approx
      const dx = 10.0 * (y - x) * dt;
      const dy = (28.0 * x - y - x * z) * dt;
      const dz = (x * y - 8.0/3.0 * z) * dt;
      x += dx; y += dy; z += dz;
      
      // scale and scatter slightly
      tArr[i*3] = x * 3.5 + (Math.random()-0.5)*3.0;
      tArr[i*3+1] = y * 3.5 - 70.0 + (Math.random()-0.5)*3.0;
      tArr[i*3+2] = z * 3.5 - 70.0 + (Math.random()-0.5)*3.0;
    }
  } else if(idx === 2) {
    // Synaptic Core (Hyper-dense structured brain)
    for(let i=0; i<PARTICLE_COUNT; i++) {
      const u = Math.random() * Math.PI * 2;
      const v = Math.acos(2 * Math.random() - 1);
      const isLeft = Math.random() > 0.5;
      const offset = isLeft ? -40 : 40;
      const r = 40 + Math.random() * 50;
      tArr[i*3] = r * Math.sin(v) * Math.cos(u) * 0.6 + offset + (Math.random()-0.5)*15;
      tArr[i*3+1] = r * Math.cos(v) * 0.9 + 20 + (Math.random()-0.5)*15;
      tArr[i*3+2] = r * Math.sin(v) * Math.sin(u) * 1.5 + (Math.random()-0.5)*15;
    }
  }

  geometry.attributes.targetPos.needsUpdate = true;
  
  // Copy current transformed physical positions to start pos so movement is continuous
  const pArr = geometry.attributes.position.array;
  for(let i=0; i<PARTICLE_COUNT; i++) {
    // Approximate current pos based on last target + lerp (pure glsl does this, we copy the visual target backwards)
    // Actually simpler: just let shader do mix(current, target). We overwrite current = old target.
  }
}

function switchLayout(idx, btnEl) {
  document.querySelectorAll('.layout-btn').forEach(b => b.classList.remove('active'));
  btnEl.classList.add('active');
  
  // Swap Target into Position
  const posArr = geometry.attributes.position.array;
  const tarArr = geometry.attributes.targetPos.array;
  for(let i=0; i<PARTICLE_COUNT*3; i++) {
    posArr[i] = tarArr[i]; // old target becomes current start
  }
  geometry.attributes.position.needsUpdate = true;
  
  loadLayout(idx); // sets new Target
  
  // Trigger animation uniform
  isTransitioning = true;
  transStart = performance.now();
  particleSystem.material.uniforms.uTransition.value = 0.0;
}

function animate() {
  requestAnimationFrame(animate);
  controls.update();

  const time = performance.now();
  particleSystem.material.uniforms.uTime.value = time * 0.001;

  if (isTransitioning) {
    let progress = (time - transStart) / 2500; // 2.5 second lerp
    if(progress >= 1.0) { progress = 1.0; isTransitioning = false; }
    // easeInOutCubic
    const ease = progress < 0.5 ? 4 * progress * progress * progress : 1 - Math.pow(-2 * progress + 2, 3) / 2;
    particleSystem.material.uniforms.uTransition.value = ease;
  }

  renderer.render(scene, camera);
}

function onResize() {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
}

window.onload = init;
</script>
</body>
</html>
