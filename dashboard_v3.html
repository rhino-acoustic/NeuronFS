<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>NeuronFS V3 - Generative Artwork</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
  <style>
    :root { --bg: #030305; --accent: #10b981; --surface: rgba(15, 20, 30, 0.5); }
    body { margin: 0; background: var(--bg); color: #fff; font-family: 'Inter', sans-serif; overflow: hidden; }
    #gl-container { position: absolute; top:0; left:0; width: 100vw; height: 100vh; z-index: 1; }
    #ui-panel {
      position: absolute; top: 30px; left: 30px; z-index: 10; width: 340px;
      background: var(--surface); backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.08); border-radius: 12px; padding: 25px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.5);
    }
    h1 { font-size: 18px; margin: 0 0 20px 0; font-weight: 600; text-transform: uppercase; letter-spacing: 2px; }
    p { font-size: 12px; color: #94a3b8; line-height: 1.6; margin-bottom: 20px; }
    .layout-btn {
      display: block; width: 100%; text-align: left; background: rgba(0,0,0,0.3); 
      border: 1px solid rgba(255,255,255,0.05); color: #94a3b8; padding: 12px 20px; 
      margin-bottom: 10px; border-radius: 6px; cursor: pointer; transition: all 0.3s;
      font-size: 13px; font-weight: 500;
    }
    .layout-btn:hover { background: rgba(16, 185, 129, 0.1); color: #fff; }
    .layout-btn.active {
      background: rgba(16, 185, 129, 0.15); border-color: var(--accent); color: var(--accent);
      box-shadow: 0 0 20px rgba(16, 185, 129, 0.3);
    }
  </style>
</head>
<body>

<div id="gl-container"></div>
<div id="ui-panel">
  <h1>V3 Generative Art</h1>
  <p>압도적인 성능의 Vertex Shader 기반 커스텀 입자(Particles) 맵.<br><b>300,000</b>개의 빛 점들을 사용한 아트워크 레이아웃.</p>
  <button class="layout-btn active" onclick="switchLayout(0, this)">1. Neural Galaxy (나선 은하)</button>
  <button class="layout-btn" onclick="switchLayout(1, this)">2. Lorenz Attractor (카오스 에너지)</button>
  <button class="layout-btn" onclick="switchLayout(2, this)">3. Synaptic Core (초정밀 군집)</button>
</div>

<script>
const PARTICLE_COUNT = 300000;
let scene, camera, renderer, controls, particleSystem;

// GLSL Shaders for 300K smooth transition points
const vertShader = `
  uniform float uTime;
  uniform float uTransition;
  uniform vec3 uColorCore;
  uniform vec3 uColorEdge;
  attribute vec3 targetPos;
  attribute vec3 aColor;
  attribute float aSize;
  varying vec3 vColor;
  
  void main() {
    // Smooth Lerp between current (position) and target (targetPos)
    vec3 mixedPos = mix(position, targetPos, uTransition);
    
    // Ambient breathing/floating noise
    float breath = sin(uTime * 2.0 + mixedPos.x * 0.05) * 2.0;
    mixedPos.y += breath * uTransition; 
    
    // Spinning core effect
    float angle = uTime * 0.2;
    float s = sin(angle), c = cos(angle);
    mat2 rot = mat2(c, -s, s, c);
    mixedPos.xz = rot * mixedPos.xz;

    vec4 mvPosition = modelViewMatrix * vec4(mixedPos, 1.0);
    
    // Mathematical depth-based coloring
    float distToCenter = length(mixedPos);
    // map distance 0..250 to 1.0..0.0
    float depthFactor = clamp(1.0 - (distToCenter / 200.0), 0.0, 1.0);
    // Exponential falloff for super bright hot core
    depthFactor = pow(depthFactor, 3.0); 
    
    // Mix individual assigned color with intense core glow based on depth
    vec3 blendedColor = mix(aColor, uColorCore, depthFactor);
    vColor = blendedColor;
    
    // Size attenuation (closer = bigger)
    gl_PointSize = (aSize + depthFactor * 4.0) * (150.0 / -mvPosition.z);
    gl_Position = projectionMatrix * mvPosition;
  }
`;

const fragShader = `
  varying vec3 vColor;
  void main() {
    // Create soft glowing circle texture mathematically
    vec2 p = gl_PointCoord - vec2(0.5);
    float dist = length(p);
    if(dist > 0.5) discard;
    
    // Soft gaussian-like falloff
    float alpha = exp(-dist * dist * 10.0);
    gl_FragColor = vec4(vColor * 1.5, alpha); // x1.5 for extra bloom brightness
  }
`;

let targetPositions = [];
let currentPositions = [];
let geometry;
let transStart = 0;
let isTransitioning = false;

function init() {
  const container = document.getElementById('gl-container');
  scene = new THREE.Scene();
  scene.fog = new THREE.FogExp2(0x030305, 0.002);

  camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 1, 2000);
  camera.position.set(250, 180, 350);

  renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(window.devicePixelRatio);
  renderer.setClearColor(0x030305, 1.0);
  container.appendChild(renderer.domElement);

  controls = new THREE.OrbitControls(camera, renderer.domElement);
  controls.enableDamping = true;
  controls.autoRotate = true; controls.autoRotateSpeed = 0.5;

  // Initialize buffers
  const posArr = new Float32Array(PARTICLE_COUNT * 3);
  const targetArr = new Float32Array(PARTICLE_COUNT * 3);
  const colorArr = new Float32Array(PARTICLE_COUNT * 3);
  const sizeArr = new Float32Array(PARTICLE_COUNT);

  const colors = [
    new THREE.Color(0x10b981), // Emerald
    new THREE.Color(0x3b82f6), // Blue
    new THREE.Color(0x06b6d4), // Cyan
    new THREE.Color(0x8b5cf6), // Violet
    new THREE.Color(0x2dd4bf)  // Teal
  ];

  for(let i=0; i<PARTICLE_COUNT; i++) {
    const x = (Math.random()-0.5) * 800;
    const y = (Math.random()-0.5) * 800;
    const z = (Math.random()-0.5) * 800;
    
    posArr[i*3] = x; posArr[i*3+1] = y; posArr[i*3+2] = z;
    targetArr[i*3] = x; targetArr[i*3+1] = y; targetArr[i*3+2] = z;
    
    sizeArr[i] = Math.random() < 0.05 ? 3.0 + Math.random()*2.0 : Math.random() * 1.5;
    
    const col = colors[Math.floor(Math.random()*colors.length)];
    colorArr[i*3] = col.r; colorArr[i*3+1] = col.g; colorArr[i*3+2] = col.b;
  }

  geometry = new THREE.BufferGeometry();
  geometry.setAttribute('position', new THREE.BufferAttribute(posArr, 3));
  geometry.setAttribute('targetPos', new THREE.BufferAttribute(targetArr, 3));
  geometry.setAttribute('aColor', new THREE.BufferAttribute(colorArr, 3));
  geometry.setAttribute('aSize', new THREE.BufferAttribute(sizeArr, 1));

  const material = new THREE.ShaderMaterial({
    uniforms: {
      uTime: { value: 0.0 },
      uTransition: { value: 1.0 },
      uColorCore: { value: new THREE.Color(0xfffbcc) }, // super bright warm white/gold core
      uColorEdge: { value: new THREE.Color(0x10b981) }
    },
    vertexShader: vertShader,
    fragmentShader: fragShader,
    transparent: true, depthWrite: false, blending: THREE.AdditiveBlending
  });

  particleSystem = new THREE.Points(geometry, material);
  scene.add(particleSystem);

  window.addEventListener('resize', onResize);
  
  // Re-generate UI buttons properly
  const ui = document.getElementById('ui-panel');
  ui.innerHTML = \`
    <h1>V3 Generative Art</h1>
    <p>중심으로 말려들어갈수록 초고온(화이트+골드)으로 색이 변하며, 깊이감이 극대화된 구조체들.</p>
    <button class="layout-btn active" onclick="switchLayout(0, this)">1. Neural Spiral Galaxy</button>
    <button class="layout-btn" onclick="switchLayout(1, this)">2. Lorenz Chaos Energy</button>
    <button class="layout-btn" onclick="switchLayout(2, this)">3. Synaptic Brain Core</button>
    <button class="layout-btn" onclick="switchLayout(3, this)">4. Quantum Torus (도넛형 에너지)</button>
    <button class="layout-btn" onclick="switchLayout(4, this)">5. Clifford Attractor (비단결 리본)</button>
    <button class="layout-btn" onclick="switchLayout(5, this)">6. Supernova Explosion (초신성 코어)</button>
    <button class="layout-btn" onclick="switchLayout(6, this)">7. Fibonacci Sphere (황금비 넥서스)</button>
  \`;
  
  setTimeout(() => loadLayout(0), 100);
  animate();
}

function loadLayout(idx) {
  const tArr = geometry.attributes.targetPos.array;
  
  if(idx === 0) { // Neural Galaxy
    for(let i=0; i<PARTICLE_COUNT; i++) {
      const radius = Math.pow(Math.random(), 3) * 220;
      const angle = radius * 0.15 + Math.random() * Math.PI * 2;
      const spread = Math.max(0, 50 - radius*0.2); 
      tArr[i*3] = Math.cos(angle) * (radius + Math.random()*spread);
      tArr[i*3+1] = (Math.random()-0.5) * spread * 2.0;
      tArr[i*3+2] = Math.sin(angle) * (radius + Math.random()*spread);
    }
  } else if(idx === 1) { // Lorenz Attractor
    let x = 0.1, y = 0, z = 0, dt = 0.005;
    for(let i=0; i<PARTICLE_COUNT; i++) {
      const dx = 10.0 * (y - x) * dt;
      const dy = (28.0 * x - y - x * z) * dt;
      const dz = (x * y - 8.0/3.0 * z) * dt;
      x += dx; y += dy; z += dz;
      tArr[i*3] = x * 4.0 + (Math.random()-0.5)*2.0;
      tArr[i*3+1] = y * 4.0 - 80.0 + (Math.random()-0.5)*2.0;
      tArr[i*3+2] = z * 4.0 - 80.0 + (Math.random()-0.5)*2.0;
    }
  } else if(idx === 2) { // Synaptic Brain Core
    for(let i=0; i<PARTICLE_COUNT; i++) {
      const u = Math.random() * Math.PI * 2;
      const v = Math.acos(2 * Math.random() - 1);
      const isLeft = Math.random() > 0.5;
      const offset = isLeft ? -45 : 45;
      const r = 30 + Math.pow(Math.random(), 1.5) * 60; // Denser core
      tArr[i*3] = r * Math.sin(v) * Math.cos(u) * 0.6 + offset + (Math.random()-0.5)*12;
      tArr[i*3+1] = r * Math.cos(v) * 0.9 + 20 + (Math.random()-0.5)*12;
      tArr[i*3+2] = r * Math.sin(v) * Math.sin(u) * 1.5 + (Math.random()-0.5)*12;
    }
  } else if(idx === 3) { // Quantum Torus
    for(let i=0; i<PARTICLE_COUNT; i++) {
      const u = Math.random() * Math.PI * 2;
      const v = Math.random() * Math.PI * 2;
      const R = 80; // Distance to center of tube
      const r = 40 * Math.pow(Math.random(), 0.5); // Density towards tube center
      tArr[i*3] = (R + r * Math.cos(v)) * Math.cos(u);
      tArr[i*3+1] = r * Math.sin(v);
      tArr[i*3+2] = (R + r * Math.cos(v)) * Math.sin(u);
    }
  } else if(idx === 4) { // Clifford Attractor
    let x = 0, y = 0, a = -1.4, b = 1.6, c = 1.0, d = 0.7;
    for(let i=0; i<PARTICLE_COUNT; i++) {
      let xn = Math.sin(a * y) + c * Math.cos(a * x);
      let yn = Math.sin(b * x) + d * Math.cos(b * y);
      x = xn; y = yn;
      // Map 2D attractor to 3D with a twist
      tArr[i*3] = x * 60 + (Math.random()-0.5)*1.5;
      tArr[i*3+1] = y * 60 + (Math.random()-0.5)*1.5;
      tArr[i*3+2] = Math.sin(x*y) * 40 + (Math.random()-0.5)*1.5;
    }
  } else if(idx === 5) { // Supernova Form
    for(let i=0; i<PARTICLE_COUNT; i++) {
      const dist = Math.pow(Math.random(), 6.0) * 300; // Extreme density near 0
      const u = Math.random() * Math.PI * 2;
      const v = Math.acos(2 * Math.random() - 1);
      tArr[i*3] = dist * Math.sin(v) * Math.cos(u);
      tArr[i*3+1] = dist * Math.cos(v);
      tArr[i*3+2] = dist * Math.sin(v) * Math.sin(u);
    }
  } else if(idx === 6) { // Fibonacci Sphere Layering
    const phi = Math.PI * (3 - Math.sqrt(5));
    for(let i=0; i<PARTICLE_COUNT; i++) {
      const y = 1 - (i / (PARTICLE_COUNT - 1)) * 2;
      const radius = Math.sqrt(1 - y*y);
      const theta = phi * i;
      const layerDist = 50 + Math.pow((i % 100)/100, 2) * 100; // distinct shells
      tArr[i*3] = Math.cos(theta) * radius * layerDist;
      tArr[i*3+1] = y * layerDist;
      tArr[i*3+2] = Math.sin(theta) * radius * layerDist;
    }
  }

  geometry.attributes.targetPos.needsUpdate = true;
}

function switchLayout(idx, btnEl) {
  document.querySelectorAll('.layout-btn').forEach(b => b.classList.remove('active'));
  btnEl.classList.add('active');
  
  const posArr = geometry.attributes.position.array;
  const tarArr = geometry.attributes.targetPos.array;
  for(let i=0; i<PARTICLE_COUNT*3; i++) {
    posArr[i] = tarArr[i]; 
  }
  geometry.attributes.position.needsUpdate = true;
  
  loadLayout(idx);
  
  isTransitioning = true;
  transStart = performance.now();
  particleSystem.material.uniforms.uTransition.value = 0.0;
}

function animate() {
  requestAnimationFrame(animate);
  controls.update();

  const time = performance.now();
  particleSystem.material.uniforms.uTime.value = time * 0.001;

  if (isTransitioning) {
    let progress = (time - transStart) / 2500; 
    if(progress >= 1.0) { progress = 1.0; isTransitioning = false; }
    const ease = progress < 0.5 ? 4 * progress * progress * progress : 1 - Math.pow(-2 * progress + 2, 3) / 2;
    particleSystem.material.uniforms.uTransition.value = ease;
  }

  renderer.render(scene, camera);
}

function onResize() {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
}

window.onload = init;
</script>
</body>
</html>
