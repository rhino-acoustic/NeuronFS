<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="70%" fx="50%" fy="30%">
      <stop offset="0%" stop-color="#0a0a14" />
      <stop offset="100%" stop-color="#030305" />
    </radialGradient>

    <!-- Layer Glow Filters -->
    <filter id="glowLayer" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <filter id="glowPrime" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <filter id="glowSoft" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Grid Pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="100%" height="100%" fill="url(#bgGrad)" />
  <rect width="100%" height="100%" fill="url(#grid)" />

  <!-- Background decorative rings (Singularity effect) -->
  <g transform="translate(960, 900)" opacity="0.3">
    <ellipse rx="500" ry="100" fill="none" stroke="#3b82f6" stroke-width="0.5" transform="scale(1.2)" />
    <ellipse rx="300" ry="60" fill="none" stroke="#10b981" stroke-width="1" />
    <ellipse rx="100" ry="20" fill="none" stroke="#e11d48" stroke-width="2" />
  </g>

  <!-- 7 Layer Triangular Folds (Top-down mapped to Z-curves) -->
  <g transform="translate(960, 200)" filter="url(#glowLayer)">
    <!-- 7: Prefrontal (#f8fafc) - OUTERMOST -->
    <path d="M -700,0 Q 0,200 700,0 Q 350,350 0,700 Q -350,350 -700,0 Z" fill="none" stroke="#f8fafc" stroke-width="1.5" opacity="0.3" />
    <path d="M -680,20 Q 0,220 680,20 Q 340,360 0,680 Q -340,360 -680,20 Z" fill="none" stroke="#f8fafc" stroke-width="0.5" opacity="0.1" />

    <!-- 6: Ego (#8b5cf6) -->
    <path d="M -580,50 Q 0,240 580,50 Q 290,380 0,650 Q -290,380 -580,50 Z" fill="none" stroke="#8b5cf6" stroke-width="2" opacity="0.4" />
    <path d="M -560,70 Q 0,260 560,70 Q 280,400 0,620 Q -280,400 -560,70 Z" fill="none" stroke="#8b5cf6" stroke-width="0.8" opacity="0.2" />

    <!-- 5: Cortex (#3b82f6) -->
    <path d="M -460,100 Q 0,280 460,100 Q 230,420 0,600 Q -230,420 -460,100 Z" fill="none" stroke="#3b82f6" stroke-width="2.5" opacity="0.5" />
    <path d="M -440,120 Q 0,300 440,120 Q 220,440 0,580 Q -220,440 -440,120 Z" fill="none" stroke="#3b82f6" stroke-width="1" opacity="0.3" />

    <!-- 4: Sensors (#10b981) -->
    <path d="M -340,150 Q 0,320 340,150 Q 170,460 0,550 Q -170,460 -340,150 Z" fill="none" stroke="#10b981" stroke-width="3" opacity="0.6" />
    <path d="M -320,170 Q 0,340 320,170 Q 160,480 0,530 Q -160,480 -320,170 Z" fill="none" stroke="#10b981" stroke-width="1.2" opacity="0.4" />

    <!-- 3: Hippocampus (#eab308) -->
    <path d="M -240,200 Q 0,360 240,200 Q 120,500 0,500 Q -120,500 -240,200 Z" fill="none" stroke="#eab308" stroke-width="3.5" opacity="0.7" />

    <!-- 2: Limbic (#f97316) -->
    <path d="M -160,250 Q 0,400 160,250 Q 80,540 0,450 Q -80,540 -160,250 Z" fill="none" stroke="#f97316" stroke-width="4" opacity="0.8" />

    <!-- 1: Brainstem (#e11d48) - INNERMOST CORE -->
    <path d="M -80,300 Q 0,440 80,300 Q 40,580 0,400 Q -40,580 -80,300 Z" fill="none" stroke="#e11d48" stroke-width="5" opacity="1.0" />
  </g>

  <!-- Connective Threads / Axon Web -->
  <g transform="translate(960, 200)" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="1">
    <line x1="-700" y1="0" x2="-80" y2="300" />
    <line x1="700" y1="0" x2="80" y2="300" />
    <line x1="0" y1="200" x2="0" y2="400" />
    
    <path d="M -340,150 L -160,250 L 0,400 L 160,250 L 340,150" />
    <path d="M -580,50 L -240,200 L 0,350 L 240,200 L 580,50" />
  </g>

  <!-- Neurons (Floating Particles along the curves) -->
  <g transform="translate(960, 200)">
    <!-- Soft Normal Neurons (Tiny dots, size 2-4) -->
    <g filter="url(#glowSoft)">
    <circle cx="-500" cy="80" r="3" fill="#8b5cf6" opacity="0.6"/>
    <circle cx="480" cy="70" r="2.5" fill="#8b5cf6" opacity="0.8"/>
    <circle cx="-300" cy="190" r="3" fill="#3b82f6" opacity="0.5"/>
    <circle cx="340" cy="220" r="4" fill="#3b82f6" opacity="0.7"/>
    <circle cx="-180" cy="280" r="3.5" fill="#10b981" opacity="0.6"/>
    <circle cx="150" cy="300" r="2" fill="#10b981" opacity="0.8"/>
    <circle cx="-90" cy="360" r="3" fill="#eab308" opacity="0.9"/>
    <circle cx="20" cy="450" r="4" fill="#f97316" opacity="0.6"/>
    
    <circle cx="-620" cy="30" r="2" fill="#f8fafc" opacity="0.4"/>
    <circle cx="650" cy="50" r="3" fill="#f8fafc" opacity="0.5"/>
    <circle cx="-210" cy="400" r="2.5" fill="#3b82f6" opacity="0.8"/>
    <circle cx="180" cy="420" r="3" fill="#10b981" opacity="0.7"/>
    </g>

    <!-- PRIME Neurons (Massive, bright circles, size 12-18) -->
    <g filter="url(#glowPrime)">
      <!-- Ego Prime -->
      <circle cx="-420" cy="180" r="14" fill="#8b5cf6" />
      <circle cx="-420" cy="180" r="4" fill="#ffffff" />
      
      <!-- Cortex Prime -->
      <circle cx="280" cy="280" r="15" fill="#3b82f6" />
      <circle cx="280" cy="280" r="5" fill="#ffffff" />

      <!-- Sensor Prime -->
      <circle cx="-120" cy="380" r="12" fill="#10b981" />
      <circle cx="-120" cy="380" r="4" fill="#ffffff" />

      <!-- Hippocampus Prime -->
      <circle cx="140" cy="420" r="16" fill="#eab308" />
      <circle cx="140" cy="420" r="6" fill="#ffffff" />

      <!-- Brainstem Prime (SINGULARITY CORE) -->
      <circle cx="0" cy="560" r="22" fill="#e11d48" />
      <circle cx="0" cy="560" r="8" fill="#ffffff" />
    </g>

    <!-- Connectivity UI details for Primes -->
    <g fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="1" font-family="'JetBrains Mono', monospace" font-size="10" fill-opacity="0.8">
      <!-- Cortex Target -->
      <circle cx="280" cy="280" r="28" stroke="#3b82f6" stroke-dasharray="4 4" />
      <line x1="280" y1="280" x2="350" y2="240" stroke="#3b82f6" opacity="0.5" />
      <text x="355" y="235" fill="#3b82f6">PRIME: _CORTEX</text>
      <text x="355" y="250" fill="rgba(255,255,255,0.5)">DOPAMINE: 0.94</text>

      <!-- Ego Target -->
      <circle cx="-420" cy="180" r="24" stroke="#8b5cf6" stroke-dasharray="2 6" />
      <line x1="-420" y1="180" x2="-500" y2="150" stroke="#8b5cf6" opacity="0.5" />
      <text x="-640" y="145" fill="#8b5cf6">PRIME: _EGO_ROOT</text>
      <text x="-640" y="160" fill="rgba(255,255,255,0.5)">COUNTER: 40</text>

      <!-- Brainstem Target -->
      <circle cx="0" cy="560" r="35" stroke="#e11d48" stroke-dasharray="1 3" />
      <line x1="0" y1="560" x2="100" y2="620" stroke="#e11d48" opacity="0.5" />
      <text x="105" y="625" fill="#e11d48">PRIME: _BRAINSTEM [BOMB🔥]</text>
      <text x="105" y="640" fill="rgba(255,255,255,0.5)">CRITICAL CORE NODE</text>
    </g>
  </g>

  <!-- Title / Legend GUI Overlay -->
  <g font-family="'Inter', sans-serif" fill="#f8fafc">
    <text x="80" y="120" font-size="42" font-weight="800" font-family="'JetBrains Mono', monospace" letter-spacing="0.1em">NEURONFS V3</text>
    <text x="80" y="150" font-size="14" fill="#94a3b8" letter-spacing="0.2em">7-LAYER SUBSUMPTION GEOMETRY</text>

    <!-- Legend -->
    <g transform="translate(80, 250)" font-size="12" font-weight="600" letter-spacing="0.1em">
      <text y="0" fill="#94a3b8">ARCHITECTURE TOPOLOGY</text>
      
      <circle cx="10" cy="30" r="6" fill="#f8fafc" /> <text x="30" y="34" fill="#f8fafc">P6 _PREFRONTAL</text>
      <circle cx="10" cy="60" r="8" fill="#8b5cf6" filter="url(#glowSoft)"/> <text x="30" y="64" fill="#8b5cf6">P5 _EGO [PRIME]</text>
      <circle cx="10" cy="90" r="8" fill="#3b82f6" filter="url(#glowSoft)"/> <text x="30" y="94" fill="#3b82f6">P4 _CORTEX [PRIME]</text>
      <circle cx="10" cy="120" r="8" fill="#10b981" filter="url(#glowSoft)"/> <text x="30" y="124" fill="#10b981">P3 _SENSORS [PRIME]</text>
      <circle cx="10" cy="150" r="8" fill="#eab308" filter="url(#glowSoft)"/> <text x="30" y="154" fill="#eab308">P2 _HIPPOCAMPUS [PRIME]</text>
      <circle cx="10" cy="180" r="6" fill="#f97316" /> <text x="30" y="184" fill="#f97316">P1 _LIMBIC</text>
      <circle cx="10" cy="210" r="8" fill="#e11d48" filter="url(#glowPrime)"/> <text x="30" y="214" fill="#e11d48">P0 _BRAINSTEM [ROOT PRIME]</text>
    </g>

    <!-- System Metrics Panel Frame -->
    <path d="M 1500,80 L 1800,80 L 1810,90 L 1810,250 L 1780,280 L 1490,280 L 1480,270 L 1480,100 Z" fill="rgba(15,20,30,0.6)" stroke="#10b981" stroke-width="1" />
    <g transform="translate(1500, 110)" font-family="'JetBrains Mono', monospace">
      <text x="20" y="0" font-size="10" fill="#10b981" letter-spacing="0.1em">SYSTEM_ANALYTICS</text>
      <rect x="20" y="10" width="270" height="1" fill="rgba(255,255,255,0.1)" />
      
      <text x="20" y="40" font-size="11" fill="#94a3b8">PARTICLES RENDERED</text>
      <text x="290" y="40" font-size="14" fill="#fff" text-anchor="end" font-weight="bold">300,000</text>

      <text x="20" y="75" font-size="11" fill="#94a3b8">ACTIVE PRIME NODES</text>
      <text x="290" y="75" font-size="14" fill="#f59e0b" text-anchor="end" font-weight="bold">42</text>

      <text x="20" y="110" font-size="11" fill="#94a3b8">SUBSUMPTION FREQ</text>
      <text x="290" y="110" font-size="14" fill="#3b82f6" text-anchor="end" font-weight="bold">60.1 FPS</text>
      
      <text x="20" y="145" font-size="11" fill="#94a3b8">CORE STATUS</text>
      <text x="290" y="145" font-size="14" fill="#10b981" text-anchor="end" font-weight="bold">AUTOPILOT_ON</text>
    </g>

    <!-- Bottom HUD elements -->
    <path d="M 40,1000 L 300,1000" stroke="#3b82f6" stroke-width="2" />
    <path d="M 300,1000 L 330,970 L 400,970" stroke="#3b82f6" stroke-width="2" />
    <text x="40" y="990" font-size="10" fill="#3b82f6" font-family="'JetBrains Mono', monospace">RAYCASTER: ACTIVE [THRESHOLD: 4.0]</text>
  </g>
</svg>
