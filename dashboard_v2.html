<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NeuronFS V2: Autopilot Nerve Center</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg: #030305; --surface: rgba(15, 20, 30, 0.6); --border: rgba(255,255,255,0.08);
  --accent: #10b981; --accent-glow: rgba(16, 185, 129, 0.3);
  --danger: #ef4444; --text: #f8fafc; --text-muted: #94a3b8;
  --font-ui: 'Inter', sans-serif; --font-mono: 'JetBrains Mono', monospace;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: var(--font-ui); overflow: hidden; display: flex; height: 100vh; }

/* Left: Holographic 3D WebGL Map */
#gl-container { flex: 1; position: relative; border-right: 1px solid var(--border); background: radial-gradient(circle at center, #0a0a14 0%, #030305 100%); }
canvas { display: block; width: 100%; height: 100%; outline: none; }

/* Right: Nerve Center Console */
#console-container { width: 450px; background: var(--surface); display: flex; flex-direction: column; backdrop-filter: blur(28px); -webkit-backdrop-filter: blur(28px); position: relative; z-index: 10; }
.header { padding: 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
.brand h1 { font-size: 18px; font-weight: 800; letter-spacing: 0.1em; color: #fff; text-shadow: 0 0 10px rgba(255,255,255,0.2); }
.brand span { color: var(--accent); }
.ver { font-size: 10px; color: var(--text-muted); font-family: var(--font-mono); }

/* Autopilot Status */
.ap-status { padding: 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
.status-indicator { display: flex; align-items: center; gap: 10px; }
.pulse-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--accent); box-shadow: 0 0 15px var(--accent); }
.pulse-dot.pulsing { animation: pulse 2s infinite; }
.pulse-dot.off { background: var(--text-muted); box-shadow: none; animation: none; }
@keyframes pulse { 0% { box-shadow: 0 0 0 0 var(--accent-glow); } 70% { box-shadow: 0 0 0 10px rgba(16, 185, 129, 0); } 100% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); } }

.toggle-btn { background: rgba(16, 185, 129, 0.1); border: 1px solid var(--accent); color: var(--accent); padding: 8px 16px; border-radius: 4px; font-size: 11px; font-weight: 800; cursor: pointer; transition: all 0.2s; font-family: var(--font-mono); }
.toggle-btn:hover { background: rgba(16, 185, 129, 0.2); box-shadow: 0 0 15px var(--accent-glow); }
.toggle-btn.off { background: rgba(148, 163, 184, 0.1); border-color: var(--text-muted); color: var(--text-muted); }
.toggle-btn.off:hover { background: rgba(148, 163, 184, 0.2); box-shadow: none; }

/* TTY Feed / Metrics */
.tty-feed { flex: 1; padding: 20px; font-family: var(--font-mono); font-size: 11px; overflow-y: auto; color: #a1a1aa; line-height: 1.6; }
.tty-feed::-webkit-scrollbar { width: 4px; }
.tty-feed::-webkit-scrollbar-thumb { background: var(--border); }
.log-line { margin-bottom: 6px; display: flex; gap: 8px; }
.log-ts { color: #52525b; flex-shrink: 0; }
.log-info { color: #60a5fa; }
.log-warn { color: #fbbf24; }
.log-error { color: #ef4444; }

.metrics-panel { padding: 20px; border-top: 1px solid var(--border); display: grid; grid-template-columns: 1fr 1fr; gap: 15px; background: rgba(0,0,0,0.3); }
.metric { display: flex; flex-direction: column; gap: 4px; }
.m-label { font-size: 9px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-muted); }
.m-value { font-size: 16px; font-weight: 800; color: #fff; font-family: var(--font-mono); }

/* Audit Trail (Phase 43) */
.audit-panel { padding: 12px 20px; border-top: 1px solid var(--border); max-height: 160px; overflow-y: auto; background: rgba(0,0,0,0.4); }
.audit-panel::-webkit-scrollbar { width: 3px; }
.audit-panel::-webkit-scrollbar-thumb { background: var(--border); }
.audit-title { font-size: 9px; text-transform: uppercase; letter-spacing: 0.15em; color: var(--accent); margin-bottom: 8px; font-family: var(--font-mono); }
.audit-entry { font-size: 10px; font-family: var(--font-mono); color: #71717a; margin-bottom: 4px; display: flex; gap: 6px; }
.audit-actor { color: #60a5fa; min-width: 90px; }
.audit-action { color: #a78bfa; }
.audit-ok { color: var(--accent); }
.audit-fail { color: var(--danger); }

/* Codemap Panel (Quick Win 4) */
.codemap-panel { padding: 12px 20px; border-top: 1px solid var(--border); max-height: 180px; overflow-y: auto; background: rgba(0,0,0,0.35); }
.codemap-panel::-webkit-scrollbar { width: 3px; }
.codemap-panel::-webkit-scrollbar-thumb { background: var(--border); }
.codemap-title { font-size: 9px; text-transform: uppercase; letter-spacing: 0.15em; color: #8b5cf6; margin-bottom: 8px; font-family: var(--font-mono); cursor: pointer; }
.codemap-entry { font-size: 10px; font-family: var(--font-mono); color: #71717a; margin-bottom: 3px; display: flex; justify-content: space-between; }
.codemap-name { color: #a78bfa; }
.codemap-lines { color: #52525b; }

/* Debounce Overlay */
#debounce-overlay { position: absolute; top: 20px; left: 20px; background: rgba(16, 185, 129, 0.1); border: 1px solid var(--accent); backdrop-filter: blur(10px); padding: 12px 20px; border-radius: 8px; font-family: var(--font-mono); color: var(--accent); display: none; align-items: center; gap: 12px; box-shadow: 0 0 20px var(--accent-glow); z-index: 20; }
.db-spinner { width: 14px; height: 14px; border: 2px solid var(--accent); border-top-color: transparent; border-radius: 50%; animation: spin 1s linear infinite; }
@keyframes spin { 100% { transform: rotate(360deg); } }

/* Overlay UI */
.overlay-stats { position: absolute; bottom: 20px; left: 20px; font-family: var(--font-mono); font-size: 10px; color: var(--text-muted); pointer-events: none; z-index: 20; }

/* Fire Spark CSS */
.fire-flash { box-shadow: inset 0 0 100px rgba(16, 185, 129, 0.4); transition: box-shadow 0.1s; }
.fire-text { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #10b981; font-family: var(--font-mono); font-size: 24px; font-weight: 800; text-shadow: 0 0 20px rgba(16,185,129,0.8); opacity: 0; pointer-events: none; z-index: 30; }
@keyframes floatUp { 0% { opacity: 1; transform: translate(-50%, -50%) scale(1); } 100% { opacity: 0; transform: translate(-50%, -150%) scale(1.5); } }
</style>
</head>
<body>

<div id="gl-container">
  <div id="debounce-overlay">
    <div class="db-spinner"></div>
    <div>CDP INJECTION COOLDOWN: <span id="db-timer" style="font-weight:700">60s</span></div>
  </div>
  <div class="overlay-stats" id="gl-stats">InstancedMesh | 0 Draw Calls</div>
</div>

<div id="console-container">
  <div class="header">
    <div class="brand"><h1><span>Neuron</span>FS V2</h1><span class="ver">Autopilot Nerve Center</span></div>
    <div style="display:flex;gap:6px">
      <button class="toggle-btn" style="font-size:9px;padding:6px 10px;border-color:#8b5cf6;color:#8b5cf6;background:rgba(139,92,246,0.1)" onclick="runIntegrity()">🛡️ CHECK</button>
      <button class="toggle-btn" style="font-size:9px;padding:6px 10px;border-color:#f59e0b;color:#f59e0b;background:rgba(245,158,11,0.1)" onclick="runInject()">🔄 INJECT</button>
      <button class="toggle-btn" id="btn-autopilot" onclick="toggleAutopilot()">AUTOPILOT: ON</button>
    </div>
  </div>
  
  <div class="ap-status">
    <div class="status-indicator">
      <div class="pulse-dot pulsing" id="ap-dot"></div>
      <div style="font-size:12px; font-weight:600; color:#fff" id="ap-text">System Listening...</div>
    </div>
  </div>

  <div class="tty-feed" id="tty">
    <!-- Live logs injected here -->
  </div>

  <div class="metrics-panel">
    <div class="metric">
      <span class="m-label">Active Neurons</span>
      <span class="m-value" id="m-neurons">---</span>
    </div>
    <div class="metric">
      <span class="m-label">Total Activation</span>
      <span class="m-value" id="m-act">---</span>
    </div>
    <div class="metric">
      <span class="m-label">Node Daemon</span>
      <span class="m-value" style="color:var(--accent)">ONLINE</span>
    </div>
    <div class="metric">
      <span class="m-label">Go Supervisor</span>
      <span class="m-value" style="color:var(--accent)">ONLINE</span>
    </div>
  </div>

  <div class="audit-panel" id="audit-feed">
    <div class="audit-title">🔍 Autonomous Audit Trail (Phase 43)</div>
  </div>

  <div class="codemap-panel" id="codemap-feed">
    <div class="codemap-title">🗺️ Runtime Code Map (Phase 57)</div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
<script>
let scene, camera, renderer, controls;
let instancedMesh;
let axonMesh;
const dummy = new THREE.Object3D();

function init3D() {
  const container = document.getElementById('gl-container');
  scene = new THREE.Scene();
  scene.fog = new THREE.FogExp2(0x030305, 0.003);

  camera = new THREE.PerspectiveCamera(45, container.clientWidth / container.clientHeight, 1, 1000);
  camera.position.set(100, 80, 150);

  renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
  renderer.setSize(container.clientWidth, container.clientHeight);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  container.appendChild(renderer.domElement);

  controls = new THREE.OrbitControls(camera, renderer.domElement);
  controls.enableDamping = true;
  controls.dampingFactor = 0.05;
  controls.autoRotate = true;
  controls.autoRotateSpeed = 0.5;

  fetchGraphQLBrain();

  scene.add(new THREE.AmbientLight(0x10b981, 0.2));
  const pLight = new THREE.PointLight(0x3b82f6, 1, 300);
  pLight.position.set(0, 50, 0);
  scene.add(pLight);
  window.pLight = pLight; // expose for sparks

  window.addEventListener('resize', onWindowResize);
  animate();
}

// Phase 57: REST API Brain Fetcher (replaces GraphQL — GraphQL server never existed)
async function fetchGraphQLBrain() {
  try {
    const res = await fetch('/api/brain');
    if(!res.ok) throw new Error('REST API Error');
    const json = await res.json();
    // Transform REST response to match renderGraphQLBrain format
    const brainRegions = json.regions.map(r => ({
      name: r.name,
      count: r.neurons ? r.neurons.length : 0,
      neurons: r.neurons || []
    }));
    // Update metrics from real data
    document.getElementById('m-neurons').innerText = (json.totalNeurons || 0).toLocaleString();
    document.getElementById('m-act').innerText = (json.totalCounter || 0).toLocaleString();
    renderGraphQLBrain(brainRegions);
    setTimeout(fetchGraphQLBrain, 5000);
  } catch(e) {
    console.error('[REST Brain]', e);
    document.getElementById('gl-stats').innerText = 'API OFFLINE | Retrying...';
    setTimeout(fetchGraphQLBrain, 5000);
  }
}

function renderGraphQLBrain(brainRegions) {
  if(!brainRegions) return;
  
  if(instancedMesh) {
    scene.remove(instancedMesh);
    instancedMesh.geometry.dispose();
    instancedMesh.material.dispose();
  }
  if(axonMesh) {
    scene.remove(axonMesh);
    axonMesh.geometry.dispose();
    axonMesh.material.dispose();
  }

  let totalNeurons = 0;
  brainRegions.forEach(r => totalNeurons += r.count);
  
  // Guard for empty brain
  if(totalNeurons === 0) {
    document.getElementById('gl-stats').innerText = `Brain Empty`;
    return;
  }

  const geometry = new THREE.OctahedronGeometry(1.2, 0);
  const material = new THREE.MeshPhongMaterial({
    color: 0xffffff,
    transparent: true,
    opacity: 0.8,
    shininess: 100,
    blending: THREE.AdditiveBlending
  });

  instancedMesh = new THREE.InstancedMesh(geometry, material, totalNeurons);
  
  let i = 0;
  const positions = [];
  
  // Map Region Names to rough 3D Offsets & Colors
  const regionOffsets = {
    "cortex": { x:0, y:20, z:0, scale: 60, col: 0x3b82f6 },
    "limbic": { x:0, y:-10, z:0, scale: 30, col: 0xdc2626 },
    "brainstem": { x:0, y:-40, z:-10, scale: 20, col: 0xfbbf24 },
    "prefrontal": { x:0, y:40, z:20, scale: 25, col: 0x10b981 },
    "ego": { x:0, y:0, z:40, scale: 15, col: 0x8b5cf6 },
    "sensors": { x:30, y:0, z:0, scale: 35, col: 0x14b8a6 },
    "shared": { x:-30, y:0, z:0, scale: 35, col: 0x94a3b8 }
  };

  brainRegions.forEach(region => {
    const meta = regionOffsets[region.name] || {x:0, y:0, z:0, scale:40, col:0xffffff};
    
    // Distribute nodes spherically around the region offset
    region.neurons.forEach((neuron) => {
      const u = Math.random();
      const v = Math.random();
      const theta = 2 * Math.PI * u;
      const phi = Math.acos(2 * v - 1);
      
      const r = Math.random() * meta.scale;
      
      const px = meta.x + r * Math.sin(phi) * Math.cos(theta);
      const py = meta.y + r * Math.sin(phi) * Math.sin(theta);
      const pz = meta.z + r * Math.cos(phi);
      
      positions.push(new THREE.Vector3(px, py, pz));
      dummy.position.set(px, py, pz);
      
      // Variable size based on depth
      const dist = Math.sqrt(px*px + py*py + pz*pz);
      const s = Math.max(0.3, 1 - (dist / 100));
      dummy.scale.set(s, s, s);
      
      dummy.updateMatrix();
      instancedMesh.setMatrixAt(i, dummy.matrix);
      
      const color = new THREE.Color(meta.col);
      instancedMesh.setColorAt(i, color);
      i++;
    });
  });

  instancedMesh.instanceMatrix.needsUpdate = true;
  if(instancedMesh.instanceColor) instancedMesh.instanceColor.needsUpdate = true;
  
  scene.add(instancedMesh);
  // --- Generate Axons (Inter-neuron connections) ---
  const linePositions = [];
  // Connect random nodes if they are close
  const queryCount = Math.min(2000, totalNeurons); 
  for(let j=0; j<queryCount; j++) {
    const p1 = positions[Math.floor(Math.random() * totalNeurons)];
    for(let k=0; k<30; k++) {
      const p2 = positions[Math.floor(Math.random() * totalNeurons)];
      if (p1 && p2 && p1.distanceTo(p2) < 20) {
        linePositions.push(p1.x, p1.y, p1.z);
        linePositions.push(p2.x, p2.y, p2.z);
        break; 
      }
    }
  }
  
  const axonMaterial = new THREE.LineBasicMaterial({
    color: 0x3b82f6,
    transparent: true,
    opacity: 0.25,
    blending: THREE.AdditiveBlending,
    depthWrite: false
  });
  
  const lineGeo = new THREE.BufferGeometry();
  lineGeo.setAttribute('position', new THREE.Float32BufferAttribute(linePositions, 3));
  axonMesh = new THREE.LineSegments(lineGeo, axonMaterial);
  scene.add(axonMesh);

  document.getElementById('gl-stats').innerText = `GraphQL InstancedMesh | ${totalNeurons.toLocaleString()} Neurons | ${(linePositions.length/6).toLocaleString()} Axons`;
}

function onWindowResize() {
  const container = document.getElementById('gl-container');
  camera.aspect = container.clientWidth / container.clientHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(container.clientWidth, container.clientHeight);
}

function animate() {
  requestAnimationFrame(animate);
  controls.update();

  const time = performance.now() * 0.001;
  scene.rotation.y = Math.sin(time * 0.1) * 0.1;
  
  renderer.render(scene, camera);
}

window.onload = init3D;

// ═══ Major Project: Neuron CRUD via 3D interaction ═══
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();
let neuronPaths = []; // populated by fetchGraphQLBrain

// Store neuron paths for click lookup
const _origRender = renderGraphQLBrain;
function renderGraphQLBrainWithPaths(brainRegions) {
  neuronPaths = [];
  if (brainRegions) {
    brainRegions.forEach(r => {
      (r.neurons || []).forEach(n => {
        neuronPaths.push({ name: n.name, path: n.path, region: r.name });
      });
    });
  }
  _origRender(brainRegions);
}
// Patch: override global reference
window._renderBrain = renderGraphQLBrainWithPaths;

// Click → Fire neuron
document.getElementById('gl-container').addEventListener('click', async function(e) {
  if (e.target.tagName === 'BUTTON') return;
  const container = document.getElementById('gl-container');
  const rect = container.getBoundingClientRect();
  mouse.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
  mouse.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;
  raycaster.setFromCamera(mouse, camera);
  
  if (!instancedMesh) return;
  const intersects = raycaster.intersectObject(instancedMesh);
  if (intersects.length > 0) {
    const idx = intersects[0].instanceId;
    const neuron = neuronPaths[idx];
    if (!neuron) return;
    
    if (e.shiftKey) {
      // Shift+Click → Grow new neuron
      const name = prompt('New neuron name (under ' + neuron.region + '):');
      if (name) {
        const path = neuron.region + '/' + name;
        await fetch('/api/grow', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({path}) });
        logTTY('🌱 GROWN: ' + path, 'info');
        triggerSparkEffect(path);
      }
    } else {
      // Click → Fire
      await fetch('/api/fire', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({path: neuron.path}) });
      logTTY('🔥 FIRED: ' + neuron.path, 'info');
      triggerSparkEffect(neuron.path);
    }
  }
});

// Right-click → Neuron info tooltip
document.getElementById('gl-container').addEventListener('contextmenu', function(e) {
  e.preventDefault();
  const container = document.getElementById('gl-container');
  const rect = container.getBoundingClientRect();
  mouse.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
  mouse.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;
  raycaster.setFromCamera(mouse, camera);
  
  if (!instancedMesh) return;
  const intersects = raycaster.intersectObject(instancedMesh);
  if (intersects.length > 0) {
    const idx = intersects[0].instanceId;
    const neuron = neuronPaths[idx];
    if (neuron) {
      logTTY('📍 ' + neuron.region + '/' + neuron.name + ' [' + neuron.path + ']', 'info');
    }
  }
});

function logTTY(msg, type='info') {
  const tty = document.getElementById('tty');
  const d = new Date();
  const ts = `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}:${String(d.getSeconds()).padStart(2,'0')}`;
  
  const el = document.createElement('div');
  el.className = 'log-line';
  el.innerHTML = `<span class="log-ts">[${ts}]</span><span class="log-${type}">${msg}</span>`;
  tty.appendChild(el);
  tty.scrollTop = tty.scrollHeight;
  if(tty.children.length > 100) tty.removeChild(tty.firstChild);
}

function triggerSparkEffect(path) {
  if(window.pLight) {
    window.pLight.color.setHex(0x10b981);
    window.pLight.intensity = 4;
    let dec = setInterval(() => {
      window.pLight.intensity -= 0.2;
      if(window.pLight.intensity <= 1) {
        window.pLight.intensity = 1;
        window.pLight.color.setHex(0x3b82f6);
        clearInterval(dec);
      }
    }, 50);
  }

  const container = document.getElementById('gl-container');
  container.classList.add('fire-flash');
  setTimeout(() => container.classList.remove('fire-flash'), 150);

  const txt = document.createElement('div');
  txt.className = 'fire-text';
  txt.innerText = "🔥 " + path.split('/').pop().replace(".neuron","");
  txt.style.animation = 'floatUp 1s ease-out forwards';
  container.appendChild(txt);
  setTimeout(() => { if(txt.parentNode) txt.remove(); }, 1000);
}

let autopilotEnabled = true;

async function initData() {
  logTTY("Initializing Autopilot V2 OS...", "info");
  logTTY("Strangler Fig Node Boot Sequence Complete.", "info");
  fetchAutopilotState();
  initSSE();
  setInterval(fetchAutopilotState, 5000);
}

async function fetchAutopilotState() {
  try {
    const r = await fetch('/api/autopilot');
    const d = await r.json();
    autopilotEnabled = d.autopilot;
    updateApBtn();
  } catch(e) {}
}

async function toggleAutopilot() {
  try {
    const r = await fetch('/api/autopilot', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({enabled: !autopilotEnabled})
    });
    const d = await r.json();
    autopilotEnabled = d.autopilot;
    updateApBtn();
    logTTY(`Autopilot state forced: ${autopilotEnabled ? 'ONLINE' : 'HALTED'}`, autopilotEnabled ? 'success' : 'warn');
  } catch(e) { logTTY("Toggle failed", "error"); }
}

function updateApBtn() {
  const btn = document.getElementById('btn-autopilot');
  const dot = document.getElementById('ap-dot');
  const txt = document.getElementById('ap-text');
  
  if(autopilotEnabled) {
    btn.innerHTML = 'AUTOPILOT: ON';
    btn.className = 'toggle-btn';
    dot.className = 'pulse-dot pulsing';
    txt.innerHTML = 'System Listening & Ready';
  } else {
    btn.innerHTML = 'AUTOPILOT: OFF';
    btn.className = 'toggle-btn off';
    dot.className = 'pulse-dot off';
    txt.innerHTML = 'Autopilot Overridden (Manual)';
  }
}

function initSSE() {
  const evtSource = new EventSource('/api/stream');
  evtSource.onmessage = function(e) {
    try {
      const d = JSON.parse(e.data);
      if (d.type === 'stat') {
        document.getElementById('m-neurons').innerText = d.totalNeurons.toLocaleString();
        document.getElementById('m-act').innerText = d.totalActivation.toLocaleString();
      } else if (d.type === 'log') {
        logTTY(d.message, d.level);
      } else if (d.type === 'fire') {
        logTTY(`🔥 NEURON FIRED: ${d.path} (${d.old} → ${d.new})`, 'info');
        triggerSparkEffect(d.path);
      }
    } catch(err) {}
  };
  evtSource.onerror = function() {
    logTTY("Connection lost to Telemetry stream. Reconnecting...", "error");
  };
  logTTY("SSE Telemetry Stream Connected.", "success");
}

// Phase 57: Audit Trail REST Polling (replaces GraphQL — uses /api/evolution)
async function fetchAuditTrail() {
  try {
    const r = await fetch('/api/evolution');
    const json = await r.json();
    const entries = json?.entries || json?.trail || [];
    const feed = document.getElementById('audit-feed');
    feed.innerHTML = '<div class="audit-title">🔍 Autonomous Audit Trail</div>';
    entries.slice(-10).forEach(e => {
      const ts = e.ts ? e.ts.substring(11, 19) : '??:??:??';
      const icon = e.success !== false ? '✅' : '❌';
      const cls = e.success !== false ? 'audit-ok' : 'audit-fail';
      feed.innerHTML += `<div class="audit-entry"><span style="color:#52525b">${ts}</span><span class="audit-actor">${e.actor || 'system'}</span><span class="audit-action">${e.action || e.type || ''}</span><span class="${cls}">${icon}</span></div>`;
    });
  } catch(e) {}
}
// Health metrics from /api/health
async function fetchHealth() {
  try {
    const r = await fetch('/api/health');
    const d = await r.json();
    const subs = d.subsystems || {};
    const nodeEl = document.querySelectorAll('.m-value')[2];
    const goEl = document.querySelectorAll('.m-value')[3];
    if (nodeEl) nodeEl.innerHTML = subs.mcp?.status === 'alive' ? '<span style="color:var(--accent)">ONLINE</span>' : '<span style="color:var(--danger)">OFFLINE</span>';
    if (goEl) goEl.innerHTML = subs.supervisor?.status === 'alive' ? '<span style="color:var(--accent)">ONLINE</span>' : '<span style="color:#fbbf24">UNKNOWN</span>';
  } catch(e) {}
}
setInterval(fetchAuditTrail, 15000);
setInterval(fetchHealth, 10000);
fetchAuditTrail();
fetchHealth();

// Quick Win 1: /api/state → brain_state.json 메트릭
async function fetchState() {
  try {
    const r = await fetch('/api/state');
    if (!r.ok) return;
    const d = await r.json();
    if (d.totalNeurons) document.getElementById('m-neurons').innerText = d.totalNeurons.toLocaleString();
    if (d.totalActivation) document.getElementById('m-act').innerText = d.totalActivation.toLocaleString();
  } catch(e) {}
}
setInterval(fetchState, 8000);

// Quick Win 2: /api/ops → TTY 피드에 오퍼레이션 로그 주입
async function fetchOps() {
  try {
    const r = await fetch('/api/ops');
    if (!r.ok) return;
    const d = await r.json();
    if (d.ops && Array.isArray(d.ops)) {
      d.ops.slice(-5).forEach(op => {
        const level = op.success === false ? 'error' : 'info';
        logTTY(`[${op.actor || 'sys'}] ${op.action || ''} → ${op.target || ''}`, level);
      });
    }
  } catch(e) {}
}
setInterval(fetchOps, 20000);
fetchOps();

// Quick Win 3: /api/usage → Groq/Emotion 메트릭
async function fetchUsage() {
  try {
    const r = await fetch('/api/usage');
    if (!r.ok) return;
    const d = await r.json();
    if (d.uptime) {
      const uptimeEl = document.querySelector('.ver');
      if (uptimeEl) uptimeEl.innerText = `Autopilot Nerve Center | ⏱ ${d.uptime}`;
    }

}
setInterval(fetchUsage, 30000);

// Quick Win 4: /api/codemap → 코드맵 패널
async function fetchCodemap() {
  try {
    const r = await fetch('/api/codemap');
    if (!r.ok) return;
    const d = await r.json();
    const feed = document.getElementById('codemap-feed');
    feed.innerHTML = `<div class="codemap-title">🗺️ Runtime Code Map — ${d.totalFiles || 0} files, ${(d.totalLines || 0).toLocaleString()} lines</div>`;
    if (d.files && Array.isArray(d.files)) {
      d.files.sort((a, b) => b.lines - a.lines).slice(0, 20).forEach(f => {
        const bar = '█'.repeat(Math.min(20, Math.floor(f.lines / 20)));
        feed.innerHTML += `<div class="codemap-entry"><span class="codemap-name">${f.name}</span><span class="codemap-lines">${f.lines}L ${bar}</span></div>`;
      });
    }
  } catch(e) {}
}
setInterval(fetchCodemap, 60000);
fetchCodemap();

// Stacked: /api/integrity → 무결성 검사
async function runIntegrity() {
  logTTY('🛡️ Running integrity check...', 'info');
  try {
    const r = await fetch('/api/integrity');
    const d = await r.json();
    const status = d.status || 'unknown';
    const regions = d.regions || [];
    logTTY(`🛡️ Integrity: ${status} (${regions.length} regions scanned)`, status === 'NOMINAL' ? 'info' : 'error');
    regions.forEach(rg => {
      const icon = rg.status === 'intact' ? '✅' : rg.status === 'empty' ? '⚪' : '❌';
      logTTY(`  ${icon} ${rg.region}: ${rg.status} (${rg.files || 0} files)`, rg.status === 'violated' ? 'error' : 'info');
    });
  } catch(e) { logTTY('❌ Integrity check failed', 'error'); }
}

// Stacked: /api/inject → 뻠 재주입
async function runInject() {
  logTTY('🔄 Re-injecting brain into GEMINI.md...', 'warn');
  try {
    const r = await fetch('/api/inject', { method: 'POST' });
    const text = await r.text();
    logTTY('✅ ' + text, 'info');
  } catch(e) { logTTY('❌ Inject failed', 'error'); }
}

// Stacked: /api/evolve → 진화 트리거
async function runEvolve(dryRun = true) {
  logTTY(`🧬 Evolve triggered (dry_run=${dryRun})...`, 'info');

    const r = await fetch('/api/evolve', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({dry_run: dryRun}) });

    logTTY(`🧬 Evolve: ${d.status || 'complete'} — ${d.changes || 0} changes`, 'info');

}
